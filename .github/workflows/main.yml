name: Keep Business Pioneers Alive

on:
  schedule:
    # بيشتغل كل يوم الساعة 12 بالليل
    - cron: '0 0 * * *'
  workflow_dispatch: # عشان تقدر تشغله يدوي للتجربة

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Business Pioneers Site
        # غيري اللينك ده للينك الحقيقي بتاع المشروع على Vercel
        run: curl -s https://your-business-pioneers-link.vercel.app
